version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: labtronix_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: labtronix_db
      POSTGRES_USER: labtronix_user
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-labtronix_dev_pass}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U labtronix_user -d labtronix_db']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: labtronix_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: labtronix_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
